[project]
name = "public-cohort"
schema_version = 1

[resolver]
provider = "ena"
fields = [
  "run_accession",
  "study_accession",
  "secondary_study_accession",
  "sample_accession",
  "secondary_sample_accession",
  "experiment_accession",
  "library_layout",
  "instrument_platform",
  "instrument_model",
  "fastq_ftp",
  "fastq_md5",
  "fastq_bytes",
  "submitted_ftp",
  "submitted_md5",
  "submitted_bytes",
]
merge_strategy = "prefer_local"

[download]
concurrency = 2
retries = 6
backoff_seconds = [1, 2, 4, 8, 16, 32]
prefer = "fastq"
method = "reqwest"

[refs]
organism = "human"
ensembl = "latest"
custom_gtf = ""
custom_cdna = ""

[storage]
shared_root = ""
max_active_size = "" # e.g. "100GB"; pauses new downloads when project storage reaches the limit

[quant]
engine = "r-kallisto"
worker_budget = 0 # 0 = auto (all available minus reserve), otherwise total CPU budget for preprocess+quant
threads = 16 # max kallisto threads per run
workers = 0 # optional cap on parallel quant runs; 0 = derived from worker_budget
preprocess = false
fastq_retention = "both" # both | original | trimmed | none
preprocess_threads = 16 # capped at 16 per run
preprocess_strict = true
preprocess_max_input_mb = 1024
cleanup = "none"
trash_days = 7
cleanup_on = "success"

[quant.qc_gate]
min_pass_rate = 0.6
max_low_quality_rate = 0.3
# max_low_complexity_rate = 0.2
max_too_many_n_rate = 0.1
max_too_short_rate = 0.4
# max_duplication_rate = 0.9

[deseq2]
design = "~ batch + condition"
counts_from_abundance = "lengthScaledTPM"

[corr]
threads = 0 # 0 = use full worker_budget during correlation
transform = "vst"

[corr]
adjust = "residualize"
model = "~ batch + condition"
method = "pearson"
geneset = "topvar:5000"
output = "edges:topk=50"
